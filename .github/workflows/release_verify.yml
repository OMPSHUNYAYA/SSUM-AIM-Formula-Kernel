name: Release Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify frozen release boundary
        run: python CORE/aimfk_router.py --verify-release

      - name: Show verification output
        run: cat TASKS/TASK_RESULT.json
